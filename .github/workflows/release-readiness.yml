name: Release readiness

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness:
    name: Read-only release readiness
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      PLAYWRIGHT_BROWSERS_PATH: .artifacts/playwright/browsers
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Repository verification
        run: pnpm repository:verify

      - name: Design verification
        run: pnpm design:verify

      - name: Changesets status
        run: pnpm changeset:status

      - name: Dependency audit
        run: pnpm deps:audit

      - name: Dependency outdated report
        run: pnpm deps:outdated

      - name: Release inventory
        run: pnpm release:inventory
