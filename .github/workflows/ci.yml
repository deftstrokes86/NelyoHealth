name: Foundation CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  foundation:
    name: Repository foundation checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      PLAYWRIGHT_BROWSERS_PATH: .artifacts/playwright/browsers
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Contract drift and invariant tests
        run: pnpm test:contract

      - name: Construction gates (authz + outbox both enforcing since M2.3 / M3.3)
        run: pnpm gates:verify

      - name: Integration tests
        run: pnpm test:integration

      - name: Browser smoke tests
        run: pnpm test:browser

      - name: Accessibility smoke tests
        run: pnpm test:a11y

      - name: Visual contract tests
        run: pnpm test:visual

      - name: Build verification
        run: pnpm build

      - name: Design verification
        run: pnpm design:verify

      - name: Basic secret-pattern scan
        run: pnpm secret:scan

      - name: Community health
        run: pnpm community:verify

      - name: GitHub Actions policy
        run: pnpm actions:verify

      - name: Dependency policy
        run: pnpm deps:policy

      - name: Dependency license policy
        run: pnpm deps:licenses

      - name: Dependency inventory
        run: pnpm deps:inventory

      - name: Changesets policy
        run: node tools/checks/changeset-policy.mjs

      - name: UI UX Pro Max integrity
        run: pnpm uiux:check

      - name: Release readiness
        run: pnpm release:check
