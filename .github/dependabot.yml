version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: Africa/Lagos
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    groups:
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "@nelyohealth/*"
      - dependency-name: "ui-ux-pro-max"

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: tuesday
      time: "09:30"
      timezone: Africa/Lagos
    open-pull-requests-limit: 3
